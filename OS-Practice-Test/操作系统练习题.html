<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>操作系统练习题</title>
<style>
:root{--primary:#2563eb;--success:#16a34a;--danger:#dc2626;--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 0;background:linear-gradient(135deg,#1e3a8a,#3b82f6);color:#fff;border-radius:12px;margin-bottom:20px;box-shadow:0 4px 6px rgba(0,0,0,.1)}
header h1{font-size:28px;margin-bottom:8px}
header p{opacity:.9;font-size:14px}
.toolbar{display:flex;gap:8px;flex-wrap:nowrap;justify-content:center;margin-bottom:20px;overflow-x:auto;padding-bottom:6px}
.btn{padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-size:13px;transition:.2s;display:inline-flex;align-items:center;gap:4px;background:#e2e8f0;color:#334155;white-space:nowrap}
.btn:hover{background:#cbd5e1}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#15803d}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#b91c1c}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);padding:16px;border-radius:10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.stat-card h3{font-size:24px;color:var(--primary)}
.stat-card p{font-size:12px;color:var(--muted);margin-top:4px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;border-bottom:2px solid #e2e8f0;padding-bottom:8px}
.tab{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;background:#e2e8f0;color:#475569;transition:.2s;border:none}
.tab.active{background:var(--primary);color:#fff}
.tab:hover{opacity:.9}
.section{display:none}
.section.active{display:block}
.question-card{background:var(--card);padding:18px;border-radius:10px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:.2s}
.question-card:hover{box-shadow:0 4px 6px rgba(0,0,0,.1)}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-type{font-size:12px;color:var(--muted);background:#f1f5f9;padding:2px 8px;border-radius:4px}
.q-num{font-weight:700;color:var(--primary);margin-right:8px}
.q-text{font-size:15px;margin-bottom:12px}
.options{display:grid;gap:8px}
.option{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;border:1px solid #e2e8f0;cursor:pointer;transition:.2s}
.option:hover{background:#f8fafc}
.option input{cursor:pointer}
.option.correct{background:#dcfce7;border-color:#86efac}
.option.wrong{background:#fee2e2;border-color:#fca5a5}
.fill-input{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;transition:.2s}
.fill-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.fill-input.correct{background:#dcfce7;border-color:#16a34a}
.fill-input.wrong{background:#fee2e2;border-color:#dc2626}
.judge-btns{display:flex;gap:10px}
.judge-btn{padding:8px 20px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;transition:.2s}
.judge-btn:hover{background:#f1f5f9}
.judge-btn.selected.correct{background:#dcfce7;border-color:#16a34a;color:#14532d}
.judge-btn.selected.wrong{background:#fee2e2;border-color:#dc2626;color:#7f1d1d}
.answer-box{margin-top:12px;padding:12px;background:#f0fdf4;border-radius:8px;border-left:4px solid var(--success);display:none;font-size:14px}
.answer-box.show{display:block}
.answer-box.wrong-ans{background:#fef2f2;border-left-color:var(--danger)}
.wrong-book-btn{margin-top:10px;font-size:12px;color:var(--muted);cursor:pointer;background:none;border:none;text-decoration:underline}
.print-only{display:none}
@media print{
.no-print{display:none!important}
.print-only{display:block}
.question-card{break-inside:avoid;margin-bottom:12px;box-shadow:none;border:1px solid #ddd}
.answer-box{display:block!important;background:#f8fafc!important;border-left:3px solid #333}
body{background:#fff}
.container{max-width:100%}
}
.empty-state{text-align:center;padding:40px;color:var(--muted)}
.empty-state h3{margin-bottom:8px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000}
.modal.active{display:flex}
.modal-content{background:#fff;padding:24px;border-radius:12px;max-width:500px;width:90%;max-height:80vh;overflow:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted)}
.wrong-item{padding:12px;border-bottom:1px solid #e2e8f0;font-size:14px}
.wrong-item:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="container">
<header>
<h1>操作系统练习题</h1>
<p>计算机操作系统 · 综合练习</p>
</header>

<div class="toolbar no-print">
<button class="btn btn-primary" onclick="switchTab('all')">全部题目</button>
<button class="btn" onclick="switchTab('fillblank')">填空题</button>
<button class="btn" onclick="switchTab('choice')">选择题</button>
<button class="btn" onclick="switchTab('judge')">判断题</button>
<button class="btn" onclick="switchTab('shortanswer')">简答题</button>
<button class="btn" onclick="switchTab('calculation')">计算题</button>
<button class="btn btn-success" onclick="checkAll()">检查答案</button>
<button class="btn btn-danger" onclick="showWrongBook()">错题集</button>
<button class="btn btn-primary" onclick="exportPDF()">导出PDF</button>
<button class="btn" onclick="resetAll()">重置</button>
</div>

<div class="stats no-print" id="stats"></div>

<div id="content"></div>

<div class="print-only" style="text-align:center;padding:20px;color:#666;font-size:12px">
<p>操作系统练习题 - 打印版</p>
</div>
</div>

<div class="modal no-print" id="wrongModal">
<div class="modal-content">
<div class="modal-header">
<h3>错题集</h3>
<button class="modal-close" onclick="closeWrongBook()">&times;</button>
</div>
<div id="wrongList"></div>
</div>
</div>

<script>

shortanswer: [{"text": "1. 简述FCFS、SJF和RR三种调度算法的优缺点。（10分）", "key_text": "简述FCFS、SJF和RR三种调度算法的优缺点。（10分）", "answer": "1. 简述FCFS、SJF和RR三种调度算法的优缺点。（10分）\n答：\n(1) FCFS（先来先服务）：\n优点：实现简单，公平性好，不会饿死任何作业。\n缺点：平均等待时间长，可能产生护航效应，不利于短作业。\n\n(2) SJF（短作业优先）：\n优点：平均等待时间最短，可获得最优的平均周转时间。\n缺点：需要预知作业执行时间，可能导致长作业饥饿。\n\n(3) RR（时间片轮转）：\n优点：响应时间短，适合交互式系统，公平性好。\n缺点：平均周转时间较长，时间片选择困难，上下文切换开销大。", "source": "试卷10_计算机操作系统期末考试试卷（B卷）.docx"}, {"text": "2. 简述分页存储管理和分段存储管理的主要区别。（15分）", "key_text": "简述分页存储管理和分段存储管理的主要区别。（15分）", "answer": "2. 简述分页存储管理和分段存储管理的主要区别。（15分）\n答：分页与分段的主要区别：\n(1) 页是信息的物理单位，段是信息的逻辑单位。\n(2) 页的大小固定，由系统决定；段的大小不固定，由用户程序决定。\n(3) 分页的地址空间是一维的，分段的地址空间是二维的。\n(4) 分页是为了实现离散分配，减少外部碎片；分段是为了满足用户的逻辑需要。\n(5) 段的共享比页的共享更容易实现。\n(6) 分页对用户透明，分段对用户可见。", "source": "试卷10_计算机操作系统期末考试试卷（B卷）.docx"}, {"text": "1. 简述操作系统的四大基本特性及其含义。（10分）", "key_text": "简述操作系统的四大基本特性及其含义。（10分）", "answer": "1. 简述操作系统的四大基本特性及其含义。（10分）\n答：操作系统的四大基本特性是：\n(1) 并发性：指两个或多个事件在同一时间间隔内发生，宏观上同时发生，微观上交替发生。\n(2) 共享性：指系统中的资源可供内存中多个并发执行的进程共同使用。\n(3) 虚拟性：指通过某种技术把一个物理实体变为若干个逻辑上的对应物。\n(4) 异步性：指进程的执行是以不可预知的速度向前推进的。", "source": "试卷1_计算机操作系统复习练习试卷（一）.docx"}, {"text": "2. 简述进程与程序的区别与联系。（15分）", "key_text": "简述进程与程序的区别与联系。（15分）", "answer": "2. 简述进程与程序的区别与联系。（15分）\n答：进程与程序的区别与联系：\n(1) 程序是静态的，是一组有序指令的集合；进程是动态的，是程序的一次执行过程。\n(2) 程序可以长期保存，进程有生命周期，会创建和消亡。\n(3) 程序是永久的，进程是暂时的。\n(4) 进程具有并发性，程序没有。\n(5) 进程是资源分配和调度的基本单位，程序不是。\n(6) 一个程序可以对应多个进程，一个进程可以包含多个程序。", "source": "试卷1_计算机操作系统复习练习试卷（一）.docx"}, {"text": "2. 什么是死锁？产生死锁的四个必要条件是什么？如何预防死锁？（15分）", "key_text": "什么是死锁？产生死锁的四个必要条件是什么？如何预防死锁？（15分）", "answer": "2. 什么是死锁？产生死锁的四个必要条件是什么？如何预防死锁？（15分）\n答：\n(1) 死锁是指多个进程因竞争资源而相互等待，且这种等待永远不能结束的状态。\n\n(2) 产生死锁的四个必要条件：\n① 互斥条件：资源一次只能被一个进程占用。\n② 请求和保持条件：进程已持有资源，又申请新的资源。\n③ 不可抢占条件：已分配的资源不能被强制剥夺。\n④ 循环等待条件：存在一个进程等待链，链中每个进程都在等待下一个进程持有的资源。\n\n(3) 死锁预防方法：\n① 破坏互斥条件：使资源可共享（如SPOOLing技术）。\n② 破坏请求和保持条件：要求进程一次性申请所有资源。\n③ 破坏不可抢占条件：允许抢占资源。\n④ 破坏循环等待条件：对资源进行编号，按序申请。", "source": "试卷2_计算机操作系统复习练习试卷（二）.docx"}, {"text": "1. 什么是临界资源和临界区？临界区问题需要满足哪些原则？（10分）", "key_text": "什么是临界资源和临界区？临界区问题需要满足哪些原则？（10分）", "answer": "1. 什么是临界资源和临界区？临界区问题需要满足哪些原则？（10分）\n答：\n(1) 临界资源：一次仅允许一个进程使用的资源。\n(2) 临界区：进程中访问临界资源的那段代码。\n\n(3) 临界区问题需要满足的四个原则：\n① 空闲让进：当临界资源空闲时，应允许请求进入临界区的进程立即进入。\n② 忙则等待：当临界资源被占用时，其他试图进入临界区的进程必须等待。\n③ 有限等待：进程应在有限时间内进入临界区，避免饥饿。\n④ 让权等待：当进程不能进入临界区时，应立即释放CPU。", "source": "试卷3_计算机操作系统复习练习试卷（三）.docx"}, {"text": "2. 简述生产者-消费者问题的解决方案，包括需要使用的信号量及其作用。（15分）", "key_text": "简述生产者-消费者问题的解决方案，包括需要使用的信号量及其作用。（15分）", "answer": "2. 简述生产者-消费者问题的解决方案，包括需要使用的信号量及其作用。（15分）\n答：\n(1) 问题描述：生产者生产产品放入缓冲区，消费者从缓冲区取走产品消费。需要保证生产者不会在缓冲区满时放入产品，消费者不会在缓冲区空时取走产品。\n\n(2) 需要使用的信号量：\n① mutex（互斥信号量，初值为1）：保证生产者和消费者互斥访问缓冲区。\n② empty（同步信号量，初值为n）：表示缓冲区中空闲单元的数量。\n③ full（同步信号量，初值为0）：表示缓冲区中产品的数量。\n\n(3) 生产者进程：\nP(empty);  // 检查是否有空闲单元\nP(mutex);  // 申请进入临界区\n// 放入产品\nV(mutex);  // 退出临界区\nV(full);   // 产品数量加1\n\n(4) 消费者进程：\nP(full);   // 检查是否有产品\nP(mutex);  // 申请进入临界区\n// 取走产品\nV(mutex);  // 退出临界区\nV(empty);  // 空闲单元加1", "source": "试卷3_计算机操作系统复习练习试卷（三）.docx"}, {"text": "2. 简述分页系统中地址变换的过程，并说明引入快表后的地址变换过程。（15分）", "key_text": "简述分页系统中地址变换的过程，并说明引入快表后的地址变换过程。（15分）", "answer": "2. 简述分页系统中地址变换的过程，并说明引入快表后的地址变换过程。（15分）\n答：\n(1) 基本地址变换过程：\n① 将逻辑地址分解为页号P和页内偏移d。\n② 检查页号P是否越界。\n③ 根据页表始址和页号P查找页表，得到物理块号b。\n④ 计算物理地址 = b × 页面大小 + d。\n⑤ 访问物理地址对应的数据。\n需要访问两次内存：一次访问页表，一次访问数据。\n\n(2) 引入快表后的地址变换过程：\n① 将逻辑地址分解为页号P和页内偏移d。\n② 在快表中查找页号P。\n③ 如果命中（快表中有该页号），直接得到物理块号b，计算物理地址并访问数据。只需访问一次内存。\n④ 如果未命中，访问内存中的页表得到物理块号b，将该页表项存入快表，计算物理地址并访问数据。需要访问两次内存。\n⑤ 快表命中时可以大大提高地址变换速度。", "source": "试卷4_计算机操作系统复习练习试卷（四）.docx"}, {"text": "1. 简述虚拟存储器的基本特征和实现原理。（10分）", "key_text": "简述虚拟存储器的基本特征和实现原理。（10分）", "answer": "1. 简述虚拟存储器的基本特征和实现原理。（10分）\n答：\n(1) 虚拟存储器的基本特征：\n① 多次性：一个作业可以分多次装入内存。\n② 对换性：作业在运行过程中可以换入换出。\n③ 虚拟性：从逻辑上扩充了内存容量。\n④ 异步性：作业的装入时间是不确定的。\n\n(2) 实现原理：\n基于局部性原理，程序在执行时只需将当前需要的部分装入内存，其余部分留在外存。当访问的页面不在内存时，产生缺页中断，将所需页面调入内存。如果内存已满，则根据页面置换算法选择一个页面换出。", "source": "试卷5_计算机操作系统复习练习试卷（五）.docx"}, {"text": "2. 比较FIFO、LRU和Clock三种页面置换算法的优缺点。（15分）", "key_text": "比较FIFO、LRU和Clock三种页面置换算法的优缺点。（15分）", "answer": "2. 比较FIFO、LRU和Clock三种页面置换算法的优缺点。（15分）\n答：\n(1) FIFO（先进先出）：\n优点：实现简单，只需维护一个队列。\n缺点：可能产生Belady现象，没有考虑页面的访问情况。\n\n(2) LRU（最近最久未使用）：\n优点：性能接近OPT，不会产生Belady现象。\n缺点：实现复杂，需要硬件支持（计数器或栈），开销大。\n\n(3) Clock（时钟）：\n优点：实现简单，开销小，是LRU的近似实现。\n缺点：性能略低于LRU，需要定期清零访问位。", "source": "试卷5_计算机操作系统复习练习试卷（五）.docx"}, {"text": "1. 简述I/O控制的四种方式及其特点。（10分）", "key_text": "简述I/O控制的四种方式及其特点。（10分）", "answer": "1. 简述I/O控制的四种方式及其特点。（10分）\n答：\n(1) 程序轮询方式：CPU不断查询设备状态，直到设备就绪。特点：实现简单，但CPU效率低。\n\n(2) 中断驱动方式：设备就绪后向CPU发中断请求。特点：CPU在I/O操作期间可以执行其他任务，提高了CPU效率。\n\n(3) DMA方式：由DMA控制器控制数据在设备和内存之间直接传送。特点：数据传送不需要经过CPU，适合高速设备。\n\n(4) I/O通道方式：由专门的I/O通道执行通道程序控制I/O操作。特点：CPU效率最高，可以控制多台设备。", "source": "试卷6_计算机操作系统复习练习试卷（六）.docx"}, {"text": "2. 简述磁盘调度的FCFS、SSTF、SCAN和CSCAN四种算法的工作原理。（15分）", "key_text": "简述磁盘调度的FCFS、SSTF、SCAN和CSCAN四种算法的工作原理。（15分）", "answer": "2. 简述磁盘调度的FCFS、SSTF、SCAN和CSCAN四种算法的工作原理。（15分）\n答：\n(1) FCFS（先来先服务）：按请求到达的先后顺序服务。优点：公平简单；缺点：平均寻道时间长。\n\n(2) SSTF（最短寻道时间优先）：选择距离当前磁头位置最近的请求服务。优点：平均寻道时间较短；缺点：可能导致饥饿。\n\n(3) SCAN（扫描/电梯）：磁头来回扫描，服务经过的所有请求。优点：不会出现饥饿；缺点：两端请求等待时间较长。\n\n(4) CSCAN（循环扫描）：磁头单向扫描，到达一端后立即返回到另一端继续扫描。优点：等待时间更均匀；缺点：平均寻道时间略长。", "source": "试卷6_计算机操作系统复习练习试卷（六）.docx"}, {"text": "1. 简述文件的三种物理结构及其优缺点。（10分）", "key_text": "简述文件的三种物理结构及其优缺点。（10分）", "answer": "1. 简述文件的三种物理结构及其优缺点。（10分）\n答：\n(1) 连续分配：\n优点：实现简单，存取效率高，支持随机存取。\n缺点：会产生外部碎片，文件大小固定后不能动态增长。\n\n(2) 链接分配：\n优点：不会产生外部碎片，文件可以动态增长。\n缺点：不支持随机存取，存取效率低，需要额外的指针空间。\n\n(3) 索引分配：\n优点：支持随机存取，不会产生外部碎片，文件可以动态增长。\n缺点：需要额外的索引空间，索引表可能很大。", "source": "试卷7_计算机操作系统复习练习试卷（七）.docx"}, {"text": "2. 简述文件共享的两种实现方式及其区别。（15分）", "key_text": "简述文件共享的两种实现方式及其区别。（15分）", "answer": "2. 简述文件共享的两种实现方式及其区别。（15分）\n答：\n(1) 基于有向无环图的文件共享（硬链接）：\n实现方式：在目录中建立多个目录项指向同一个文件索引节点。\n优点：实现简单，访问效率高。\n缺点：不能跨文件系统，删除文件时需要处理引用计数。\n\n(2) 基于符号链接的文件共享（软链接）：\n实现方式：创建一个新的文件（符号链接文件），其中包含被链接文件的路径名。\n优点：可以跨文件系统，可以链接目录。\n缺点：访问效率低（需要多次查找），需要额外的存储空间。\n\n区别：硬链接直接指向文件的索引节点，符号链接指向文件的路径名。", "source": "试卷7_计算机操作系统复习练习试卷（七）.docx"}, {"text": "2. 简述进程同步与互斥的区别与联系，并说明如何使用信号量实现进程互斥。（15分）", "key_text": "简述进程同步与互斥的区别与联系，并说明如何使用信号量实现进程互斥。（15分）", "answer": "2. 简述进程同步与互斥的区别与联系，并说明如何使用信号量实现进程互斥。（15分）\n答：\n(1) 区别：\n- 互斥是指多个进程不能同时访问临界资源，是一种特殊的同步。\n- 同步是指多个进程在执行次序上的协调，范围更广。\n\n(2) 联系：\n- 互斥是同步的一种特殊情况。\n- 都可以使用信号量机制实现。\n\n(3) 使用信号量实现进程互斥：\n① 设置互斥信号量mutex，初值为1。\n② 进入临界区前执行P(mutex)。\n③ 退出临界区后执行V(mutex)。\n④ 这样保证任何时候只有一个进程在临界区内。", "source": "试卷8_计算机操作系统复习练习试卷（八）.docx"}, {"text": "2. 什么是死锁？产生死锁的四个必要条件是什么？（15分）", "key_text": "什么是死锁？产生死锁的四个必要条件是什么？（15分）", "answer": "2. 什么是死锁？产生死锁的四个必要条件是什么？（15分）\n答：\n(1) 死锁是指多个进程因竞争资源而相互等待，且这种等待永远不能结束的状态。\n\n(2) 产生死锁的四个必要条件：\n① 互斥条件：资源一次只能被一个进程占用。\n② 请求和保持条件：进程已持有资源，又申请新的资源。\n③ 不可抢占条件：已分配的资源不能被强制剥夺。\n④ 循环等待条件：存在一个进程等待链，链中每个进程都在等待下一个进程持有的资源。", "source": "试卷9_计算机操作系统期末考试试卷（A卷）.docx"}],
calculation: [{"text": "1. 有3个作业J1、J2、J3同时到达，执行时间分别为8ms、4ms、6ms。请分别计算FCFS和SJF调度算法的平均周转时间和平均带权周转时间。（10分）", "key_text": "有3个作业J1、J2、J3同时到达，执行时间分别为8ms、4ms、6ms。请分别计算FCFS和SJF调度算法的平均周转时间和平均带权周转时间。（10分）", "answer": "1. 有3个作业J1、J2、J3同时到达，执行时间分别为8ms、4ms、6ms。请分别计算FCFS和SJF调度算法的平均周转时间和平均带权周转时间。（10分）\n解：\n(1) FCFS调度（按J1、J2、J3顺序）：\n| 作业 | 完成时间 | 周转时间 | 带权周转时间 |\n| J1   | 8        | 8        | 1.0          |\n| J2   | 12       | 12       | 3.0          |\n| J3   | 18       | 18       | 3.0          |\n\n平均周转时间 = (8+12+18)/3 = 12.67ms\n平均带权周转时间 = (1.0+3.0+3.0)/3 = 2.33\n\n(2) SJF调度（按执行时间排序：J2、J3、J1）：\n| 作业 | 完成时间 | 周转时间 | 带权周转时间 |\n| J2   | 4        | 4        | 1.0          |\n| J3   | 10       | 10       | 1.67         |\n| J1   | 18       | 18       | 2.25         |\n\n平均周转时间 = (4+10+18)/3 = 10.67ms\n平均带权周转时间 = (1.0+1.67+2.25)/3 = 1.64", "source": "试卷10_计算机操作系统期末考试试卷（B卷）.docx"}, {"text": "2. 某请求分页系统，页面大小为4KB，某进程的页面访问序列为：1, 2, 3, 4, 2, 1, 5, 6, 2, 1, 2, 3, 7, 6, 3, 2, 1, 2, 3, 6。分配给该进程的物理块数为4。请计算采用LRU页面置换算法时的缺页次数和缺页率。（10分）", "key_text": "某请求分页系统，页面大小为4KB，某进程的页面访问序列为：1, 2, 3, 4, 2, 1, 5, 6, 2, 1, 2, 3, 7, 6, 3, 2, 1, 2, 3, 6。分配给该进程的物理块数为4。请计算采用LRU页面置换算法时的缺页次数和缺页率。（10分）", "answer": "2. 某请求分页系统，页面大小为4KB，某进程的页面访问序列为：1, 2, 3, 4, 2, 1, 5, 6, 2, 1, 2, 3, 7, 6, 3, 2, 1, 2, 3, 6。分配给该进程的物理块数为4。请计算采用LRU页面置换算法时的缺页次数和缺页率。（10分）\n解：\nLRU算法（物理块数=4）：\n访问序列：1, 2, 3, 4, 2, 1, 5, 6, 2, 1, 2, 3, 7, 6, 3, 2, 1, 2, 3, 6\n\n内存状态变化（最左边为最近最少使用）：\n1: [1]           缺页\n2: [1,2]         缺页\n3: [1,2,3]       缺页\n4: [1,2,3,4]     缺页\n2: [1,3,4,2]     命中\n1: [3,4,2,1]     命中\n5: [4,2,1,5]     缺页（置换3）\n6: [2,1,5,6]     缺页（置换4）\n2: [1,5,6,2]     命中\n1: [5,6,2,1]     命中\n2: [5,6,1,2]     命中\n3: [6,1,2,3]     缺页（置换5）\n7: [1,2,3,7]     缺页（置换6）\n6: [2,3,7,6]     缺页（置换1）\n3: [2,7,6,3]     命中\n2: [7,6,3,2]     命中\n1: [6,3,2,1]     缺页（置换7）\n2: [6,3,1,2]     命中\n3: [6,1,2,3]     命中\n6: [1,2,3,6]     命中\n\n缺页次数 = 10次\n缺页率 = 10/20 = 50%", "source": "试卷10_计算机操作系统期末考试试卷（B卷）.docx"}, {"text": "3. 假设磁盘请求队列中要访问的磁道号为：38, 6, 37, 100, 14, 124, 65, 67。当前磁头在50号磁道，向磁道号增加的方向移动。请分别计算FCFS和SCAN两种算法的磁头移动总距离。（5分）", "key_text": "假设磁盘请求队列中要访问的磁道号为：38, 6, 37, 100, 14, 124, 65, 67。当前磁头在50号磁道，向磁道号增加的方向移动。请分别计算FCFS和SCAN两种算法的磁头移动总距离。（5分）", "answer": "3. 假设磁盘请求队列中要访问的磁道号为：38, 6, 37, 100, 14, 124, 65, 67。当前磁头在50号磁道，向磁道号增加的方向移动。请分别计算FCFS和SCAN两种算法的磁头移动总距离。（5分）\n解：\n(1) FCFS算法：\n50 → 38 → 6 → 37 → 100 → 14 → 124 → 65 → 67\n移动距离 = 12 + 32 + 31 + 63 + 86 + 110 + 59 + 2 = 395\n\n(2) SCAN算法（向增加方向）：\n50 → 65 → 67 → 100 → 124 → 38 → 37 → 14 → 6\n移动距离 = 15 + 2 + 33 + 24 + 86 + 1 + 23 + 8 = 192", "source": "试卷10_计算机操作系统期末考试试卷（B卷）.docx"}, {"text": "1. 某计算机系统采用多道程序设计技术，内存中同时存在3个进程P1、P2、P3，它们的执行时间分别为10ms、5ms、8ms。假设系统采用单道程序设计和多道程序设计两种方式执行，忽略调度开销和I/O等待时间，计算：\n① 单道程序设计方式下，3个进程的总执行时间。（4分）\n② 多道程序设计方式下，3个进程的总执行时间。（4分）\n③ 说明多道程序设计的优点。（7分）", "key_text": "某计算机系统采用多道程序设计技术，内存中同时存在3个进程P1、P2、P3，它们的执行时间分别为10ms、5ms、8ms。假设系统采用单道程序设计和多道程序设计两种方式执行，忽略调度开销和I/O等待时间，计算：\n① 单道程序设计方式下，3个进程的总执行时间。（4分）\n② 多道程序设计方式下，3个进程的总执行时间。（4分）\n③ 说明多道程序设计的优点。（7分）", "answer": "1. 某计算机系统采用多道程序设计技术，内存中同时存在3个进程P1、P2、P3，它们的执行时间分别为10ms、5ms、8ms。假设系统采用单道程序设计和多道程序设计两种方式执行，忽略调度开销和I/O等待时间，计算：\n① 单道程序设计方式下，3个进程的总执行时间。（3分）\n② 多道程序设计方式下，3个进程的总执行时间。（3分）\n③ 说明多道程序设计的优点。（4分）\n解：\n① 单道程序设计方式下，进程顺序执行：\n总执行时间 = 10 + 5 + 8 = 23ms\n\n② 多道程序设计方式下，假设CPU在进程间切换执行，但由于是单CPU系统，总执行时间仍为：\n总执行时间 = 10 + 5 + 8 = 23ms\n\n③ 多道程序设计的优点：\n- 提高CPU利用率：当一个进程等待I/O时，CPU可以执行其他进程\n- 提高系统吞吐量：单位时间内完成更多作业\n- 提高资源利用率：多个进程共享系统资源\n- 减少响应时间：用户请求能更快得到响应", "source": "试卷1_计算机操作系统复习练习试卷（一）.docx"}, {"text": "2. 某进程的状态转换如下图所示（就绪→执行→阻塞→就绪），请回答：\n① 进程从就绪状态转换为执行状态的条件是什么？（3分）\n② 进程从执行状态转换为阻塞状态的条件是什么？（3分）\n③ 进程从阻塞状态转换为就绪状态的条件是什么？（4分）", "key_text": "某进程的状态转换如下图所示（就绪→执行→阻塞→就绪），请回答：\n① 进程从就绪状态转换为执行状态的条件是什么？（3分）\n② 进程从执行状态转换为阻塞状态的条件是什么？（3分）\n③ 进程从阻塞状态转换为就绪状态的条件是什么？（4分）", "answer": "2. 某进程的状态转换如下图所示（就绪→执行→阻塞→就绪），请回答：\n① 进程从就绪状态转换为执行状态的条件是什么？（3分）\n② 进程从执行状态转换为阻塞状态的条件是什么？（3分）\n③ 进程从阻塞状态转换为就绪状态的条件是什么？（4分）\n解：\n① 就绪→执行：进程被调度程序选中，获得CPU使用权。\n\n② 执行→阻塞：进程请求某事件（如I/O操作、申请资源失败等），主动放弃CPU。\n\n③ 阻塞→就绪：进程等待的事件发生（如I/O完成、资源可用等），被唤醒进入就绪队列。", "source": "试卷1_计算机操作系统复习练习试卷（一）.docx"}, {"text": "1. 有4个作业同时到达，它们的执行时间分别为：J1=8ms，J2=4ms，J3=6ms，J4=2ms。请分别计算采用FCFS和SJF调度算法时的平均周转时间和平均带权周转时间。（15分）", "key_text": "有4个作业同时到达，它们的执行时间分别为：J1=8ms，J2=4ms，J3=6ms，J4=2ms。请分别计算采用FCFS和SJF调度算法时的平均周转时间和平均带权周转时间。（15分）", "answer": "1. 有4个作业同时到达，它们的执行时间分别为：J1=8ms，J2=4ms，J3=6ms，J4=2ms。请分别计算采用FCFS和SJF调度算法时的平均周转时间和平均带权周转时间。（10分）\n解：\n(1) FCFS调度（按J1、J2、J3、J4顺序）：\n| 作业 | 完成时间 | 周转时间 | 带权周转时间 |\n| J1   | 8        | 8        | 1.0          |\n| J2   | 12       | 12       | 3.0          |\n| J3   | 18       | 18       | 3.0          |\n| J4   | 20       | 20       | 10.0         |\n\n平均周转时间 = (8+12+18+20)/4 = 14.5ms\n平均带权周转时间 = (1.0+3.0+3.0+10.0)/4 = 4.25\n\n(2) SJF调度（按执行时间排序：J4、J2、J3、J1）：\n| 作业 | 完成时间 | 周转时间 | 带权周转时间 |\n| J4   | 2        | 2        | 1.0          |\n| J2   | 6        | 6        | 1.5          |\n| J3   | 12       | 12       | 2.0          |\n| J1   | 20       | 20       | 2.5          |\n\n平均周转时间 = (2+6+12+20)/4 = 10ms\n平均带权周转时间 = (1.0+1.5+2.0+2.5)/4 = 1.75", "source": "试卷2_计算机操作系统复习练习试卷（二）.docx"}, {"text": "2. 系统中有5个进程P1-P5，三类资源A、B、C，资源总数分别为(10,5,7)。T0时刻Available=(3,3,2)。经银行家算法分析，安全序列为<P4,P2,P3,P5,P1>。请回答：\n① T0时刻系统是否处于安全状态？（3分）\n② 若P2请求资源(1,0,2)，系统能否分配？（4分）\n③ 说明银行家算法的基本思想。（3分）", "key_text": "系统中有5个进程P1-P5，三类资源A、B、C，资源总数分别为(10,5,7)。T0时刻Available=(3,3,2)。经银行家算法分析，安全序列为<P4,P2,P3,P5,P1>。请回答：\n① T0时刻系统是否处于安全状态？（3分）\n② 若P2请求资源(1,0,2)，系统能否分配？（4分）\n③ 说明银行家算法的基本思想。（3分）", "answer": "2. 系统中有5个进程P1-P5，三类资源A、B、C，资源总数分别为(10,5,7)。T0时刻Available=(3,3,2)。经银行家算法分析，安全序列为<P4,P2,P3,P5,P1>。请回答：\n① T0时刻系统是否处于安全状态？（3分）\n② 若P2请求资源(1,0,2)，系统能否分配？（4分）\n③ 说明银行家算法的基本思想。（3分）\n解：\n① T0时刻系统处于安全状态，因为存在安全序列<P4,P2,P3,P5,P1>。\n\n② P2请求(1,0,2)能否分配的判断：\n- Request(1,0,2) <= Need(P2)，满足条件\n- Request(1,0,2) <= Available(3,3,2)，满足条件\n- 假设分配后，系统仍处于安全状态（可以找到安全序列）\n因此，系统可以分配资源(1,0,2)给P2。\n\n③ 银行家算法的基本思想：\n- 在资源分配前，先判断系统是否会进入不安全状态\n- 如果分配后系统仍处于安全状态，则分配资源\n- 如果分配后系统进入不安全状态，则拒绝分配\n- 通过寻找安全序列来判断系统是否处于安全状态", "source": "试卷2_计算机操作系统复习练习试卷（二）.docx"}, {"text": "1. 某系统有3个并发进程R、M、P，它们共享一个缓冲区B。进程R负责从输入设备读信息到缓冲区B，进程M负责将缓冲区B中的信息进行加工，进程P负责将加工后的信息打印输出。缓冲区B中每次只能存放一个信息。请用信号量机制实现三个进程的同步。（15分）", "key_text": "某系统有3个并发进程R、M、P，它们共享一个缓冲区B。进程R负责从输入设备读信息到缓冲区B，进程M负责将缓冲区B中的信息进行加工，进程P负责将加工后的信息打印输出。缓冲区B中每次只能存放一个信息。请用信号量机制实现三个进程的同步。（15分）", "answer": "1. 某系统有3个并发进程R、M、P，它们共享一个缓冲区B。进程R负责从输入设备读信息到缓冲区B，进程M负责将缓冲区B中的信息进行加工，进程P负责将加工后的信息打印输出。缓冲区B中每次只能存放一个信息。请用信号量机制实现三个进程的同步。（10分）\n解：\n需要设置三个信号量：\n- S1（初值=1）：表示缓冲区为空，可以放入原始信息\n- S2（初值=0）：表示缓冲区中有原始信息，可以加工\n- S3（初值=0）：表示缓冲区中有加工后的信息，可以打印\n\n进程R（读入）：\nwhile(1) {\n    从输入设备读信息;\n    P(S1);     // 等待缓冲区为空\n    将信息放入缓冲区B;\n    V(S2);     // 通知M可以加工\n}\n\n进程M（加工）：\nwhile(1) {\n    P(S2);     // 等待有原始信息\n    从缓冲区B取信息加工;\n    将加工后的信息放回缓冲区B;\n    V(S3);     // 通知P可以打印\n}\n\n进程P（打印）：\nwhile(1) {\n    P(S3);     // 等待有加工后的信息\n    从缓冲区B取信息打印;\n    V(S1);     // 通知R缓冲区已空\n}", "source": "试卷3_计算机操作系统复习练习试卷（三）.docx"}, {"text": "2. 有4个进程A、B、C、D，它们都需要访问共享资源R。资源R一次只能被一个进程访问。请用信号量机制实现4个进程对资源R的互斥访问，并写出每个进程的代码结构。（10分）", "key_text": "有4个进程A、B、C、D，它们都需要访问共享资源R。资源R一次只能被一个进程访问。请用信号量机制实现4个进程对资源R的互斥访问，并写出每个进程的代码结构。（10分）", "answer": "2. 有4个进程A、B、C、D，它们都需要访问共享资源R。资源R一次只能被一个进程访问。请用信号量机制实现4个进程对资源R的互斥访问，并写出每个进程的代码结构。（5分）\n解：\n设置互斥信号量mutex，初值为1。\n\n进程A：\nP(mutex);\n// 访问资源R\nV(mutex);\n\n进程B：\nP(mutex);\n// 访问资源R\nV(mutex);\n\n进程C：\nP(mutex);\n// 访问资源R\nV(mutex);\n\n进程D：\nP(mutex);\n// 访问资源R\nV(mutex);", "source": "试卷3_计算机操作系统复习练习试卷（三）.docx"}, {"text": "1. 某分页系统，页面大小为2KB，逻辑地址空间为32页，物理空间为16块。请回答：\n① 逻辑地址需要多少位？（4分）\n② 物理地址需要多少位？（4分）\n③ 页内偏移需要多少位？（4分）\n④ 若逻辑地址为0x3A5F，请计算其页号和页内偏移。（5分）", "key_text": "某分页系统，页面大小为2KB，逻辑地址空间为32页，物理空间为16块。请回答：\n① 逻辑地址需要多少位？（4分）\n② 物理地址需要多少位？（4分）\n③ 页内偏移需要多少位？（4分）\n④ 若逻辑地址为0x3A5F，请计算其页号和页内偏移。（5分）", "answer": "1. 某分页系统，页面大小为2KB，逻辑地址空间为32页，物理空间为16块。请回答：\n① 逻辑地址需要多少位？（2分）\n② 物理地址需要多少位？（2分）\n③ 页内偏移需要多少位？（2分）\n④ 若逻辑地址为0x3A5F，请计算其页号和页内偏移。（4分）\n解：\n① 逻辑地址：32页 = 2^5，需要5位表示页号\n   页内偏移：2KB = 2^11，需要11位\n   逻辑地址 = 5 + 11 = 16位\n\n② 物理地址：16块 = 2^4，需要4位表示块号\n   页内偏移：11位\n   物理地址 = 4 + 11 = 15位\n\n③ 页内偏移需要11位\n\n④ 逻辑地址0x3A5F = 0011 1010 0101 1111（二进制）\n   页号 = 高5位 = 00111 = 7\n   页内偏移 = 低11位 = 010 0101 1111 = 0x29F", "source": "试卷4_计算机操作系统复习练习试卷（四）.docx"}, {"text": "2. 某分段系统中，段表如下所示：\n请计算下列逻辑地址对应的物理地址：\n① (0, 300)（2分）\n② (1, 500)（2分）\n③ (2, 400)（2分）\n④ (1, 900)（2分）", "key_text": "某分段系统中，段表如下所示：\n请计算下列逻辑地址对应的物理地址：\n① (0, 300)（2分）\n② (1, 500)（2分）\n③ (2, 400)（2分）\n④ (1, 900)（2分）", "answer": "2. 某分段系统中，段表如下所示：\n\n| 段号 | 段长 | 基址 |\n|------|------|------|\n| 0    | 500  | 1000 |\n| 1    | 800  | 2500 |\n| 2    | 300  | 4000 |\n\n请计算下列逻辑地址对应的物理地址：\n① (0, 300)（2分）\n② (1, 500)（2分）\n③ (2, 400)（2分）\n④ (1, 900)（2分）\n解：\n① (0, 300)：段号0，段内地址300\n   检查：300 < 500（段长），合法\n   物理地址 = 1000 + 300 = 1300\n\n② (1, 500)：段号1，段内地址500\n   检查：500 < 800（段长），合法\n   物理地址 = 2500 + 500 = 3000\n\n③ (2, 400)：段号2，段内地址400\n   检查：400 > 300（段长），非法，产生越界中断\n\n④ (1, 900)：段号1，段内地址900\n   检查：900 > 800（段长），非法，产生越界中断", "source": "试卷4_计算机操作系统复习练习试卷（四）.docx"}, {"text": "1. 某请求分页系统，页面大小为4KB，某进程的页面访问序列为：1, 2, 3, 4, 1, 2, 5, 1, 2, 3, 4, 5。分配给该进程的物理块数为3。请分别计算采用FIFO和LRU页面置换算法时的缺页次数和缺页率。（15分）", "key_text": "某请求分页系统，页面大小为4KB，某进程的页面访问序列为：1, 2, 3, 4, 1, 2, 5, 1, 2, 3, 4, 5。分配给该进程的物理块数为3。请分别计算采用FIFO和LRU页面置换算法时的缺页次数和缺页率。（15分）", "answer": "1. 某请求分页系统，页面大小为4KB，某进程的页面访问序列为：1, 2, 3, 4, 1, 2, 5, 1, 2, 3, 4, 5。分配给该进程的物理块数为3。请分别计算采用FIFO和LRU页面置换算法时的缺页次数和缺页率。（10分）\n解：\n(1) FIFO算法（物理块数=3）：\n访问序列：1, 2, 3, 4, 1, 2, 5, 1, 2, 3, 4, 5\n内存状态：\n1: [1]       缺页\n2: [1,2]     缺页\n3: [1,2,3]   缺页\n4: [2,3,4]   缺页（置换1）\n1: [3,4,1]   缺页（置换2）\n2: [4,1,2]   缺页（置换3）\n5: [1,2,5]   缺页（置换4）\n1: [1,2,5]   命中\n2: [1,2,5]   命中\n3: [2,5,3]   缺页（置换1）\n4: [5,3,4]   缺页（置换2）\n5: [5,3,4]   命中\n\n缺页次数 = 9次\n缺页率 = 9/12 = 75%\n\n(2) LRU算法（物理块数=3）：\n访问序列：1, 2, 3, 4, 1, 2, 5, 1, 2, 3, 4, 5\n内存状态：\n1: [1]       缺页\n2: [1,2]     缺页\n3: [1,2,3]   缺页\n4: [2,3,4]   缺页（置换1）\n1: [3,4,1]   缺页（置换2）\n2: [4,1,2]   缺页（置换3）\n5: [1,2,5]   缺页（置换4）\n1: [2,5,1]   命中\n2: [5,1,2]   命中\n3: [1,2,3]   缺页（置换5）\n4: [2,3,4]   缺页（置换1）\n5: [3,4,5]   缺页（置换2）\n\n缺页次数 = 10次\n缺页率 = 10/12 = 83.3%", "source": "试卷5_计算机操作系统复习练习试卷（五）.docx"}, {"text": "2. 某请求分页系统，页面大小为1KB，快表命中率为80%，快表访问时间为20ns，内存访问时间为100ns，缺页处理时间为25ms。某进程的缺页率为1%。请计算该系统的有效访问时间（EAT）。（10分）", "key_text": "某请求分页系统，页面大小为1KB，快表命中率为80%，快表访问时间为20ns，内存访问时间为100ns，缺页处理时间为25ms。某进程的缺页率为1%。请计算该系统的有效访问时间（EAT）。（10分）", "answer": "2. 某请求分页系统，页面大小为1KB，快表命中率为80%，快表访问时间为20ns，内存访问时间为100ns，缺页处理时间为25ms。某进程的缺页率为1%。请计算该系统的有效访问时间（EAT）。（5分）\n解：\nEAT = 快表命中率 × (快表访问时间 + 内存访问时间) + (1 - 快表命中率) × [(1 - 缺页率) × (快表访问时间 + 2 × 内存访问时间) + 缺页率 × (快表访问时间 + 缺页处理时间)]\n\n或者简化计算：\nEAT = 快表访问时间 + (1 - 快表命中率) × 内存访问时间 + 缺页率 × 缺页处理时间\n\n使用简化公式：\nEAT = 20ns + (1 - 0.8) × 100ns + 0.01 × 25ms\n    = 20ns + 20ns + 0.01 × 25,000,000ns\n    = 40ns + 250,000ns\n    = 250,040ns\n    ≈ 250μs", "source": "试卷5_计算机操作系统复习练习试卷（五）.docx"}, {"text": "1. 假设磁盘请求队列中要访问的磁道号为：95, 180, 34, 119, 11, 123, 62, 64。当前磁头在50号磁道，向磁道号增加的方向移动。请分别计算FCFS、SSTF和SCAN三种算法的磁头移动总距离。（15分）", "key_text": "假设磁盘请求队列中要访问的磁道号为：95, 180, 34, 119, 11, 123, 62, 64。当前磁头在50号磁道，向磁道号增加的方向移动。请分别计算FCFS、SSTF和SCAN三种算法的磁头移动总距离。（15分）", "answer": "1. 假设磁盘请求队列中要访问的磁道号为：95, 180, 34, 119, 11, 123, 62, 64。当前磁头在50号磁道，向磁道号增加的方向移动。请分别计算FCFS、SSTF和SCAN三种算法的磁头移动总距离。（10分）\n解：\n(1) FCFS算法（按请求顺序）：\n50 → 95 → 180 → 34 → 119 → 11 → 123 → 62 → 64\n移动距离：|95-50| + |180-95| + |34-180| + |119-34| + |11-119| + |123-11| + |62-123| + |64-62|\n= 45 + 85 + 146 + 85 + 108 + 112 + 61 + 2\n= 644\n\n(2) SSTF算法（每次选择最近的）：\n当前50，最近的是62（距离12）或34（距离16），选62\n50 → 62 → 64 → 34 → 11 → 95 → 119 → 123 → 180\n移动距离：12 + 2 + 30 + 23 + 84 + 24 + 4 + 57\n= 236\n\n(3) SCAN算法（向增加方向扫描）：\n50 → 62 → 64 → 95 → 119 → 123 → 180 → 34 → 11\n移动距离：12 + 2 + 31 + 24 + 4 + 57 + 146 + 23\n= 299", "source": "试卷6_计算机操作系统复习练习试卷（六）.docx"}, {"text": "2. 某磁盘转速为7200r/min，平均寻道时间为8ms，磁盘传输速率为40MB/s，磁盘控制器延迟为0.5ms。请计算读取一个8KB的扇区所需的平均时间。（10分）", "key_text": "某磁盘转速为7200r/min，平均寻道时间为8ms，磁盘传输速率为40MB/s，磁盘控制器延迟为0.5ms。请计算读取一个8KB的扇区所需的平均时间。（10分）", "answer": "2. 某磁盘转速为7200r/min，平均寻道时间为8ms，磁盘传输速率为40MB/s，磁盘控制器延迟为0.5ms。请计算读取一个8KB的扇区所需的平均时间。（5分）\n解：\n(1) 平均旋转延迟时间 = (60s / 7200) / 2 = 4.17ms\n\n(2) 传输时间 = 8KB / 40MB/s = 8192B / 40,000,000B/s = 0.205ms\n\n(3) 平均访问时间 = 寻道时间 + 旋转延迟 + 传输时间 + 控制器延迟\n= 8ms + 4.17ms + 0.205ms + 0.5ms\n= 12.875ms", "source": "试卷6_计算机操作系统复习练习试卷（六）.docx"}, {"text": "1. 某文件系统采用索引分配方式，每个盘块大小为4KB，每个盘块号占用4字节。请回答：\n① 直接索引可以索引的最大文件大小是多少？（3分）\n② 如果采用一级间接索引，可以索引的最大文件大小是多少？（4分）\n③ 如果采用二级间接索引，可以索引的最大文件大小是多少？（4分）\n④ 如果采用三级间接索引，可以索引的最大文件大小是多少？（3分）", "key_text": "某文件系统采用索引分配方式，每个盘块大小为4KB，每个盘块号占用4字节。请回答：\n① 直接索引可以索引的最大文件大小是多少？（3分）\n② 如果采用一级间接索引，可以索引的最大文件大小是多少？（4分）\n③ 如果采用二级间接索引，可以索引的最大文件大小是多少？（4分）\n④ 如果采用三级间接索引，可以索引的最大文件大小是多少？（3分）", "answer": "1. 某文件系统采用索引分配方式，每个盘块大小为4KB，每个盘块号占用4字节。请回答：\n① 直接索引可以索引的最大文件大小是多少？（2分）\n② 如果采用一级间接索引，可以索引的最大文件大小是多少？（3分）\n③ 如果采用二级间接索引，可以索引的最大文件大小是多少？（3分）\n④ 如果采用三级间接索引，可以索引的最大文件大小是多少？（2分）\n解：\n每个盘块可以存储的盘块号数 = 4KB / 4B = 1024个\n\n① 直接索引（假设有10个直接索引项）：\n最大文件大小 = 10 × 4KB = 40KB\n\n② 一级间接索引：\n最大文件大小 = 1024 × 4KB = 4MB\n\n③ 二级间接索引：\n最大文件大小 = 1024 × 1024 × 4KB = 4GB\n\n④ 三级间接索引：\n最大文件大小 = 1024 × 1024 × 1024 × 4KB = 4TB", "source": "试卷7_计算机操作系统复习练习试卷（七）.docx"}, {"text": "2. 某文件系统采用位示图管理磁盘空间，磁盘容量为1TB，盘块大小为4KB。请回答：\n① 位示图需要占用多少磁盘空间？（6分）\n② 位示图需要占用多少个盘块？（5分）", "key_text": "某文件系统采用位示图管理磁盘空间，磁盘容量为1TB，盘块大小为4KB。请回答：\n① 位示图需要占用多少磁盘空间？（6分）\n② 位示图需要占用多少个盘块？（5分）", "answer": "2. 某文件系统采用位示图管理磁盘空间，磁盘容量为1TB，盘块大小为4KB。请回答：\n① 位示图需要占用多少磁盘空间？（3分）\n② 位示图需要占用多少个盘块？（2分）\n解：\n① 磁盘总块数 = 1TB / 4KB = 2^40 / 2^12 = 2^28块\n位示图每位表示一个盘块的状态\n位示图大小 = 2^28位 = 2^28 / 8 = 2^25字节 = 32MB\n\n② 位示图占用的盘块数 = 32MB / 4KB = 8192块", "source": "试卷7_计算机操作系统复习练习试卷（七）.docx"}]
};

let currentTab = 'all';
let userAnswers = {};
let checkedSet = new Set();

function render(){
const content = document.getElementById('content');
content.innerHTML = '';

const types = currentTab==='all' ? ['fillblank','choice','judge','shortanswer','calculation'] : [currentTab];
let globalIdx = 0;

types.forEach(type=>{
const arr = data[type]||[];
if(arr.length===0) return;

const sec = document.createElement('div');
sec.className = 'section active';
sec.id = 'sec-'+type;

let title='';
if(type==='fillblank') title='一、填空题';
if(type==='choice') title='二、选择题';
if(type==='judge') title='三、判断题';
if(type==='shortanswer') title='四、简答题';
if(type==='calculation') title='五、计算题';

const h2 = document.createElement('h2');
h2.textContent = title + '（共' + arr.length + '题）';
h2.style = 'margin:20px 0 12px;font-size:18px;color:#1e293b';
sec.appendChild(h2);

arr.forEach((item, idx)=>{
globalIdx++;
const qid = type+'-'+idx;
const card = document.createElement('div');
card.className = 'question-card';

let inner = '<div class="q-header"><span class="q-num">'+globalIdx+'.</span><span class="q-type">'+typeName(type)+'</span></div>';
inner += '<div class="q-text">'+escapeHtml(item.text)+'</div>';

if(type==='choice'){
inner += '<div class="options">';
(item.options||[]).forEach(opt=>{
const [label, txt] = opt;
const checked = (userAnswers[qid]||'')===label ? 'checked' : '';
const cls = checkedSet.has(qid) ? (label===item.answer?'correct':'') : '';
let extra = '';
if(checkedSet.has(qid) && userAnswers[qid]===label && label!==item.answer) extra='wrong';
if(checkedSet.has(qid) && label===item.answer) extra='correct';
inner += '<label class="option '+extra+'"><input type="radio" name="'+qid+'" value="'+label+'" '+checked+' onchange="setAns(\''+qid+'\',\''+label+'\')"> <b>'+label+'.</b> '+escapeHtml(txt)+'</label>';
});
inner += '</div>';
} else if(type==='fillblank'){
const val = userAnswers[qid]||'';
const cls = checkedSet.has(qid) ? (checkFill(item.answer, val)?'correct':'wrong') : '';
inner += '<input class="fill-input '+cls+'" type="text" placeholder="请输入答案" value="'+escapeHtml(val)+'" oninput="setAns(\''+qid+'\',this.value)" />';
} else if(type==='judge'){
const val = userAnswers[qid]||'';
const clsTrue = (val==='√'?(checkJudge(item.answer,'√')?'selected correct':'selected wrong'):'');
const clsFalse = (val==='×'?(checkJudge(item.answer,'×')?'selected correct':'selected wrong'):'');
inner += '<div class="judge-bts">';
inner += '<button class="judge-btn '+clsTrue+'" onclick="setJudge(\''+qid+'\',\'√\')">正确 √</button>';
inner += '<button class="judge-btn '+clsFalse+'" onclick="setJudge(\''+qid+'\',\'×\')">错误 ×</button>';
inner += '</div>';
}

// answer box
const ansBoxClass = checkedSet.has(qid) && !isCorrect(type, item, userAnswers[qid]) ? 'wrong-ans' : '';
const ansDisplay = checkedSet.has(qid) ? 'show' : '';
let ansHtml = '';
if(type==='fillblank') ansHtml = '答案：' + escapeHtml(item.answer||'（暂无）');
else if(type==='choice') ansHtml = '答案：' + escapeHtml(item.answer||'（暂无）');
else if(type==='judge') ansHtml = '答案：' + (item.answer==='√'?'正确 √':'错误 ×');
else ansHtml = escapeHtml(item.answer||'（暂无答案）').replace(/\n/g,'<br>');

inner += '<div class="answer-box '+ansBoxClass+' '+ansDisplay+'"><b>参考答案：</b>'+ansHtml+'</div>';

card.innerHTML = inner;
sec.appendChild(card);
});

content.appendChild(sec);
});

updateStats();
}

function typeName(t){
const map={fillblank:'填空题',choice:'选择题',judge:'判断题',shortanswer:'简答题',calculation:'计算题'};
return map[t]||t;
}

function escapeHtml(t){
if(!t) return '';
return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setAns(qid, val){
userAnswers[qid]=val;
if(checkedSet.has(qid)){ render(); }
}

function setJudge(qid, val){
userAnswers[qid]=val;
if(checkedSet.has(qid)){ render(); } else { render(); }
}

function checkFill(ans, val){
if(!ans||!val) return false;
const a=ans.trim().replace(/[，,；;]/g,'|').split('|').map(s=>s.trim()).filter(Boolean);
const v=val.trim();
return a.some(x=>x===v||x.includes(v)||v.includes(x));
}

function checkJudge(ans, val){
return ans===val;
}

function isCorrect(type, item, val){
if(!val) return false;
if(type==='choice') return item.answer===val;
if(type==='fillblank') return checkFill(item.answer, val);
if(type==='judge') return checkJudge(item.answer, val);
return false;
}

function checkAll(){
const types = currentTab==='all' ? ['fillblank','choice','judge','shortanswer','calculation'] : [currentTab];
types.forEach(type=>{
(data[type]||[]).forEach((item,idx)=>{
const qid=type+'-'+idx;
checkedSet.add(qid);
});
});
render();
}

function updateStats(){
const types = ['fillblank','choice','judge'];
let total=0, done=0, correct=0;
types.forEach(type=>{
(data[type]||[]).forEach((item,idx)=>{
total++;
const qid=type+'-'+idx;
if(userAnswers[qid]){
done++;
if(isCorrect(type, item, userAnswers[qid])) correct++;
}
});
});
const rate = total>0 ? Math.round(correct/total*100) : 0;
const accuracy = done>0 ? Math.round(correct/done*100) : 0;
const el=document.getElementById('stats');
if(!el) return;
el.innerHTML = `
<div class="stat-card"><h3>${total}</h3><p>总题数</p></div>
<div class="stat-card"><h3>${done}</h3><p>已作答</p></div>
<div class="stat-card"><h3>${correct}</h3><p>正确数</p></div>
<div class="stat-card"><h3>${accuracy}%</h3><p>正确率</p></div>
<div class="stat-card"><h3>${Math.round(done/total*100)||0}%</h3><p>完成度</p></div>
`;
}

function switchTab(tab){
currentTab=tab;
document.querySelectorAll('.toolbar .btn').forEach((b,i)=>{
const txt = b.textContent;
if((tab==='all'&&txt==='全部题目')||(tab==='fillblank'&&txt==='填空题')||(tab==='choice'&&txt==='选择题')||(tab==='judge'&&txt==='判断题')||(tab==='shortanswer'&&txt==='简答题')||(tab==='calculation'&&txt==='计算题')){
b.classList.add('btn-primary'); b.style.background=''; b.style.color='';
} else if(!b.classList.contains('btn-success')&&!b.classList.contains('btn-danger')){
b.classList.remove('btn-primary'); b.style.background='#e2e8f0'; b.style.color='#334155';
}
});
render();
}

function showWrongBook(){
let html='';
const types=['fillblank','choice','judge'];
types.forEach(type=>{
(data[type]||[]).forEach((item,idx)=>{
const qid=type+'-'+idx;
if(checkedSet.has(qid) && userAnswers[qid] && !isCorrect(type,item,userAnswers[qid])){
html += '<div class="wrong-item"><b>'+typeName(type)+'：</b>'+escapeHtml(item.text)+'<br><span style="color:#dc2626">你的答案：'+escapeHtml(userAnswers[qid])+'</span> &nbsp; <span style="color:#16a34a">正确答案：'+escapeHtml(item.answer)+'</span></div>';
}
});
});
if(!html) html='<p style="text-align:center;color:#999">暂无错题，快去练习吧！</p>';
document.getElementById('wrongList').innerHTML=html;
document.getElementById('wrongModal').classList.add('active');
}

function closeWrongBook(){
document.getElementById('wrongModal').classList.remove('active');
}

function resetAll(){
userAnswers={};
checkedSet=new Set();
render();
}

function exportPDF(){
const oldTab = currentTab;
currentTab = 'all';
render();
setTimeout(()=>{
window.onafterprint = () => {
currentTab = oldTab;
render();
window.onafterprint = null;
};
window.print();
}, 300);
}

// keyboard shortcut: Ctrl+P native print also works
render();
</script>
</body>
